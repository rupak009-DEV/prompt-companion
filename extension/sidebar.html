<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Enhancer</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <!-- Login View -->
  <div id="login-view" class="view">
    <div class="logo-section">
      <img src="icon128.png" alt="Prompt Enhancer" class="logo" />
      <h1>Prompt Enhancer</h1>
      <p class="subtitle">Sign in with your account</p>
    </div>
    <form id="login-form" class="form">
      <input type="email" id="login-email" placeholder="Email" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <!-- Main View -->
  <div id="main-view" class="view hidden">
    <div class="header">
      <div class="header-left">
        <img src="icon48.png" alt="" class="header-icon" />
        <span class="header-title">Prompt Enhancer</span>
      </div>
    </div>

    <!-- Mode Tabs -->
    <div class="tabs">
      <button class="tab active" data-mode="quick">⚡ Quick</button>
      <button class="tab" data-mode="assisted">🔍 Assisted</button>
      <button class="tab" data-mode="wizard">📖 Wizard</button>
    </div>

    <!-- Quick Mode -->
    <div id="panel-quick" class="panel">
      <label>Your Prompt</label>
      <textarea id="quick-input" placeholder="Type or paste your prompt..." rows="5"></textarea>
      <div class="btn-row">
        <button id="quick-enhance" class="btn btn-primary">✨ Enhance</button>
        <button id="quick-clear" class="btn btn-ghost">Clear</button>
      </div>
      <div id="quick-output-section" class="output-section hidden">
        <label>Enhanced Prompt</label>
        <div id="quick-output" class="output-box"></div>
        <div class="btn-row">
          <button id="quick-push" class="btn btn-secondary">⬆ Push to Page</button>
          <button id="quick-copy" class="btn btn-ghost">📋 Copy</button>
          <button id="quick-save" class="btn btn-ghost">💾 Save</button>
          <button id="quick-json" class="btn btn-ghost">{ } JSON</button>
        </div>
        <div id="quick-json-section" class="json-section hidden">
          <label>JSON Format</label>
          <pre id="quick-json-output" class="json-box"></pre>
          <div class="btn-row">
            <button id="quick-json-copy" class="btn btn-ghost">📋 Copy JSON</button>
            <button id="quick-json-push" class="btn btn-secondary">⬆ Push JSON</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Wizard Mode -->
    <div id="panel-wizard" class="panel hidden">
      <label>Your Prompt</label>
      <textarea id="wizard-input" placeholder="Type or paste your prompt..." rows="4"></textarea>
      <div class="wizard-fields">
        <label>Intent / Goal</label>
        <input type="text" id="wiz-intent" placeholder="What do you want to achieve?" />
        <label>Target Audience</label>
        <input type="text" id="wiz-audience" placeholder="Who is this for?" />
        <label>Tone</label>
        <input type="text" id="wiz-tone" placeholder="Professional, casual, etc." />
        <label>Format</label>
        <input type="text" id="wiz-format" placeholder="Essay, list, code, etc." />
        <label>Constraints</label>
        <input type="text" id="wiz-constraints" placeholder="Any limits or requirements?" />
      </div>
      <div class="btn-row">
        <button id="wizard-enhance" class="btn btn-primary">✨ Enhance</button>
        <button id="wizard-clear" class="btn btn-ghost">Clear</button>
      </div>
      <div id="wizard-output-section" class="output-section hidden">
        <label>Enhanced Prompt</label>
        <div id="wizard-output" class="output-box"></div>
        <div class="btn-row">
          <button id="wizard-push" class="btn btn-secondary">⬆ Push to Page</button>
          <button id="wizard-copy" class="btn btn-ghost">📋 Copy</button>
          <button id="wizard-save" class="btn btn-ghost">💾 Save</button>
          <button id="wizard-json" class="btn btn-ghost">{ } JSON</button>
        </div>
        <div id="wizard-json-section" class="json-section hidden">
          <label>JSON Format</label>
          <pre id="wizard-json-output" class="json-box"></pre>
          <div class="btn-row">
            <button id="wizard-json-copy" class="btn btn-ghost">📋 Copy JSON</button>
            <button id="wizard-json-push" class="btn btn-secondary">⬆ Push JSON</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Assisted Mode -->
    <div id="panel-assisted" class="panel hidden">
      <label>Your Prompt</label>
      <textarea id="assisted-input" placeholder="Type or paste your prompt..." rows="4"></textarea>
      <button id="assisted-start" class="btn btn-primary">🔍 Analyze & Ask Questions</button>
      <div id="assisted-questions" class="questions-section hidden"></div>
      <div id="assisted-enhance-section" class="hidden">
        <button id="assisted-enhance" class="btn btn-primary">✨ Generate Enhanced Prompt</button>
      </div>
      <div id="assisted-output-section" class="output-section hidden">
        <label>Enhanced Prompt</label>
        <div id="assisted-output" class="output-box"></div>
        <div class="btn-row">
          <button id="assisted-push" class="btn btn-secondary">⬆ Push to Page</button>
          <button id="assisted-copy" class="btn btn-ghost">📋 Copy</button>
          <button id="assisted-save" class="btn btn-ghost">💾 Save</button>
          <button id="assisted-json" class="btn btn-ghost">{ } JSON</button>
        </div>
        <div id="assisted-json-section" class="json-section hidden">
          <label>JSON Format</label>
          <pre id="assisted-json-output" class="json-box"></pre>
          <div class="btn-row">
            <button id="assisted-json-copy" class="btn btn-ghost">📋 Copy JSON</button>
            <button id="assisted-json-push" class="btn btn-secondary">⬆ Push JSON</button>
          </div>
        </div>
      </div>
      <button id="assisted-clear" class="btn btn-ghost" style="margin-top:8px">Clear</button>
    </div>

    <div id="status-bar" class="status-bar hidden"></div>

    <!-- Footer Navigation -->
    <div class="sidebar-footer">
      <button id="footer-settings" class="footer-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
      <button id="footer-history" class="footer-btn" title="History">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>History</span>
      </button>
      <button id="footer-templates" class="footer-btn" title="Templates">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <span>Templates</span>
      </button>
      <button id="footer-logout" class="footer-btn footer-btn--danger" title="Sign Out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sign Out</span>
      </button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
